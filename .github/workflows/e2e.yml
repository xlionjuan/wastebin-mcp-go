name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-End
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build binary
        run: go build -o wastebin-mcp-go .

      - name: E2E tests
        env:
          E2E_MCP_BINARY: ./wastebin-mcp-go
          WASTEBIN_SERVER_URL: https://bin-staging.xlion.tw
        run: go test -v -tags=e2e -race -count=1 -timeout=600s ./...
