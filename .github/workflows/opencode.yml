name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: ${{ github.event.comment.id }}

jobs:
  opencode:
    if: |
      contains(fromJSON('["xlionjuan"]'), github.event.comment.user.login) &&
      (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # So agent can see the history
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          install-only: true

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install just
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: just@1.51.0
          fallback: none

      - name: Install Go skills for OpenCode
        env:
          # renovate: datasource=git-refs packageName=https://github.com/samber/cc-skills-golang currentValue=main
          CC_SKILLS_GOLANG_SHA: a5e0e5997aac169b659e70cb826a20b489bc4c6c
        run: |
          mkdir -p "$HOME/.agents/skills"
          git init "$HOME/.agents/skills/cc-skills-golang"
          git -C "$HOME/.agents/skills/cc-skills-golang" remote add origin https://github.com/samber/cc-skills-golang.git
          git -C "$HOME/.agents/skills/cc-skills-golang" fetch --depth=1 origin "$CC_SKILLS_GOLANG_SHA"
          git -C "$HOME/.agents/skills/cc-skills-golang" checkout --detach "$CC_SKILLS_GOLANG_SHA"

      - name: Run opencode
        uses: xlionjuan/opencode-github-actions@923fb56f9f9e1dbb1ca9294dce22a0e9b34bd43d # main
        with:
          model: opencode-go/deepseek-v4-flash
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          OPENCODE_PERMISSION: '{"external_directory": {"~/**": "allow"}}'
