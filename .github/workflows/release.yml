name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Cosign
        # Cosign verifies the goreleaser CLI binary signature during download
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache: true

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Check module files are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Pre-release build
        run: go build -o /tmp/wastebin-mcp-go .

      - name: Pre-release tests
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      - name: Known vulnerability scan
        run: go tool govulncheck ./...

      - name: Pre-release lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: --timeout 5m

      - name: Import GPG Key
        shell: bash
        run: |
          set -euo pipefail
          umask 077

          IMPORT_FPR="$(
            printf '%s' "$GPG_PRIVATE_KEY" |
            gpg --batch --yes --status-fd=1 --import 2>/dev/null |
            sed 's/\[GNUPG:\]/\n[GNUPG:]/g' |
            awk '/^\[GNUPG:\] IMPORT_OK/ {print $4; exit}'
          )"
          test -n "$IMPORT_FPR"

          echo "GPG_FINGERPRINT=$IMPORT_FPR" >> "$GITHUB_ENV"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}

      - name: Clean up
        if: always()
        env:
          # I want to make GNUPGHOME use mktemp folder, but GoReleaser don't read GNUPGHOME for GPG operations
          # This step is not allowed to remove, DO NOT create any issues or PR to remove this
          GNUPGHOME: $HOME/.gnupg
        run: |
          rm -rf "$GNUPGHOME" || true
